detection:
  thresholds:
    auth_failed_login: 3
    mail_failed_login: 3
    mail_unique_usernames: 3
    repeated_http_error: 3
  windows:
    auth_failed_login_seconds: 900
    mail_failed_login_seconds: 900
    mail_unique_usernames_seconds: 900
    repeated_http_error_seconds: 900
    success_after_failures_seconds: 3600
    web_to_auth_seconds: 3600
    web_to_ban_seconds: 3600
    multi_source_seconds: 3600
  incidents:
    gap_seconds: 1800
    minimum_evidence: 2
  rules:
    root_login_attempt: true
    repeated_failed_login: true
    success_after_failures: true
    suspicious_web_probe: true
    repeated_http_error_responses: true
    repeated_mail_auth_failures: true
    mail_password_spray_attempt: true
    mail_success_after_failures: true
    ip_banned_after_auth_activity: true
    ip_banned_after_mail_activity: true
    ip_banned_after_web_activity: true
    web_probe_followed_by_auth_activity: true
    web_probe_followed_by_fail2ban_ban: true
    multi_source_ip_activity: true
  severities:
    root_login_attempt: medium
    repeated_failed_login: medium
    success_after_failures: high
    suspicious_web_probe: medium
    repeated_http_error_responses: medium
    repeated_mail_auth_failures: medium
    mail_password_spray_attempt: high
    mail_success_after_failures: high
    ip_banned_after_auth_activity: medium
    ip_banned_after_mail_activity: medium
    ip_banned_after_web_activity: medium
    web_probe_followed_by_auth_activity: medium
    web_probe_followed_by_fail2ban_ban: medium
    multi_source_ip_activity: high

reporting:
  limits:
    top_noisy_source_ips: 5
    top_risky_source_ips: 5
    repeat_banned_ips: 5
    returned_after_ban_ips: 5
  persistence:
    repeat_banned_min_bans: 2
    persistent_multi_source_min_sources: 2
    persistent_multi_source_min_total_events: 4
    root_attempt_repeat_min_auth_events: 3
    returned_after_ban_min_returns: 1
  incident_priority:
    enabled: true
    limit: 5
    minimum_score: 1
    weights:
      severity:
        low: 1
        medium: 2
        high: 4
        critical: 6
      total_findings: 0
      total_events: 0
      ban_count: 1
      repeat_banned: 3
      returned_after_ban: 4
      persistent_multi_source: 3
      root_attempt_repeat_ip: 3
      auth_web_crossover: 3
      bursty_activity: 2
      suspicious_web_probe: 2
      web_probe_followed_by_ban: 3

nginx:
  repeated_error_threshold: 3
  error_status_codes:
    - 400
    - 401
    - 403
    - 404
    - 408
    - 429
    - 444
    - 500
    - 502
    - 503
    - 504
  suspicious_paths:
    - "/.DS_Store"
    - "/wp-login.php"
    - "/wp-admin"
    - "/wp-admin/"
    - "/wp-admin/install.php"
    - "/wp-admin/setup-config.php"
    - "/wp-config.php"
    - "/wp-config.php.bak"
    - "/wp-config.php.save"
    - "/xmlrpc.php"
    - "/.env"
    - "/.env.backup"
    - "/.env.bak"
    - "/.env.dev"
    - "/.env.example"
    - "/.env.local"
    - "/.env.old"
    - "/.env.prod"
    - "/.env.production"
    - "/.env.save"
    - "/.env.test"
    - "/.git/config"
    - "/.git/HEAD"
    - "/.git/index"
    - "/.gitlab-ci.yml"
    - "/.hg/hgrc"
    - "/.idea/workspace.xml"
    - "/.npmrc"
    - "/.ssh/authorized_keys"
    - "/.svn/entries"
    - "/.vscode/settings.json"
    - "/.well-known/security.txt"
    - "/.well-known/traffic-advice"
    - "/.well-known/change-password"
    - "/admin"
    - "/admin/"
    - "/admin.php"
    - "/administrator"
    - "/administrator/"
    - "/admin/login"
    - "/admin/login.php"
    - "/adminer"
    - "/adminer.php"
    - "/backup"
    - "/backup.zip"
    - "/backups.zip"
    - "/boaform/admin/formLogin"
    - "/cgi-bin/luci"
    - "/console"
    - "/containers/json"
    - "/debug/default/view"
    - "/docker-compose.yml"
    - "/dump.sql"
    - "/env"
    - "/etc/passwd"
    - "/hnap1"
    - "/HNAP1"
    - "/hudson/script"
    - "/jenkins/script"
    - "/login.action"
    - "/manager/html"
    - "/owa/auth/logon.aspx"
    - "/phpinfo.php"
    - "/phpmyadmin"
    - "/phpMyAdmin"
    - "/phpmyadmin/"
    - "/phpmyadmin/index.php"
    - "/pma"
    - "/portal"
    - "/remote/login"
    - "/rpc.php"
    - "/server-status"
    - "/solr/admin/info/system"
    - "/swagger-ui.html"
    - "/telescope/requests"
    - "/user/login"
    - "/vendor/.env"
    - "/vendor/phpunit/phpunit/src/Util/PHP/eval-stdin.php"
    - "/vendor/phpunit/phpunit/Util/PHP/eval-stdin.php"
    - "/web.config"
    - "/_all_dbs"
    - "/_cat/indices"
    - "/_ignition/execute-solution"
    - "/_profiler/phpinfo"
    - "/actuator"
    - "/actuator/env"
    - "/actuator/gateway/routes"
    - "/actuator/heapdump"
    - "/actuator/health"
    - "/actuator/jolokia"
    - "/actuator/logfile"
    - "/actuator/prometheus"
    - "/actuator/refresh"
    - "/actuator/routes"
    - "/actuator/threaddump"
  suspicious_path_patterns:
    - '(?:^|/)\.\.(?:/|%2f|%252f|\\)'
    - '(?:%2e%2e(?:%2f|/|%5c)|%252e%252e(?:%252f|%255c))'
    - '(?:^|[/?&;])(?:bin|usr|sbin|etc|proc|sys|dev)/(?:sh|bash|dash|zsh|busybox|passwd|shadow)\b'
    - '(?:^|[/?&;])(?:cat|curl|wget|bash|sh|chmod|chown|nc|netcat|perl|python|python3)\b'
    - '(?:;|\||`|\$\(|\${)'
    - '(?:%00|\\x00|\x00)'
    - '(?:/|^)(?:cgi-bin|\.git|\.svn|\.hg)(?:/|$)'
    - '(?:/|^)(?:backup|backups|dump|db)(?:[_\-.].*)?\.(?:zip|tar|gz|tgz|bz2|7z|sql)(?:$|[/?#])'

baseline:
  ignored_source_ips: []
  ignored_source_cidrs: []
  ignored_usernames: []
  ignored_nginx_paths: []
  ignored_user_agent_patterns: []
